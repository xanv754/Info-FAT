services:
  backend:
    image: crass-fat-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - infofat

  frontend:
    image: crass-fat-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - infofat

networks:
  infofat:
    driver: bridge